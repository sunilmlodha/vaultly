<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#6366f1"/>
  <!-- Vault door outer ring -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="white" stroke-width="40" opacity="0.3"/>
  <!-- Vault door inner ring -->
  <circle cx="512" cy="512" r="240" fill="none" stroke="white" stroke-width="30" opacity="0.5"/>
  <!-- Vault center -->
  <circle cx="512" cy="512" r="140" fill="white" opacity="0.95"/>
  <!-- V letter -->
  <text x="512" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="180" font-weight="900" fill="#6366f1" text-anchor="middle">V</text>
  <!-- Vault handle spokes -->
  <line x1="512" y1="192" x2="512" y2="272" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.6"/>
  <line x1="512" y1="752" x2="512" y2="832" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.6"/>
  <line x1="192" y1="512" x2="272" y2="512" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.6"/>
  <line x1="752" y1="512" x2="832" y2="512" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.6"/>
</svg>
